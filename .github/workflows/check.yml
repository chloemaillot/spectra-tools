name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check syntax of all JS scripts
        run: |
          for f in scripts/*.js; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test
